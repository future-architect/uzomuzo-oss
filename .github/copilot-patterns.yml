# Copilot review patterns awaiting promotion to coding rules.
#
# Phase 3 of /review appends new FIX-classified patterns here.
# When a category reaches 2+ entries, it is promoted to a rule in
# .github/instructions/ and the promoted entries are removed.
#
# Schema:
#   patterns:
#     - category: "<pattern-category>"
#       summary: "<one-line description>"
#       pr: <PR number>
#       file: "<path>"
#       date: "YYYY-MM-DD"
patterns:
  - category: "error-handling"
    summary: "Distinguish os.ErrNotExist from other I/O errors when auto-detecting files — treating all errors as 'not found' hides real causes"
    pr: 87
    file: "internal/interfaces/cli/scan.go"
    date: "2026-04-02"
  - category: "security"
    summary: "Normalize repository-scoped paths with path.Clean and reject traversal attempts (../ escaping repo root)"
    pr: 111
    file: "internal/infrastructure/depparser/ghaworkflow/parser.go"
    date: "2026-04-03"
  - category: "duplicate-parsing"
    summary: "Provide a combined parser (ParseWorkflowAll) when callers need both external URLs and local paths, avoiding double YAML unmarshal"
    pr: 111
    file: "internal/infrastructure/actionscan/discovery.go"
    date: "2026-04-03"
  - category: "logging-consistency"
    summary: "Use DEBUG for routine per-run telemetry; reserve INFO for exceptional/diagnostic events in infrastructure clients"
    pr: 116
    file: "internal/infrastructure/depsdev/depsdev.go"
    date: "2026-04-04"
  - category: "logging-consistency"
    summary: "Use snake_case for slog event names (not spaces) for consistency with other integration-layer debug events and easier log filtering"
    pr: 116
    file: "internal/infrastructure/integration/enrich_advisory.go"
    date: "2026-04-04"
  - category: "api-consistency"
    summary: "Output formats (JSON, CSV) must use the same data-source fallback chain as domain logic (e.g., stable→MaxSemver→PreRelease→Requested)"
    pr: 116
    file: "internal/interfaces/cli/scan_render.go"
    date: "2026-04-04"
  - category: "testing"
    summary: "New severity-aware branching paths (HIGH→EOL-Effective, LOW→Stalled) lacked targeted tests exercising both sides of the threshold"
    pr: 116
    file: "internal/domain/analysis/lifecycle_assessor.go"
    date: "2026-04-04"
  - category: "testing"
    summary: "New enrichment path (dedup, batch fetch, severity population, sort) was untested — add focused unit tests for helper functions"
    pr: 116
    file: "internal/infrastructure/integration/enrich_advisory.go"
    date: "2026-04-04"
  - category: "defensive-coding"
    summary: "Cache negative (404) results for immutable lookups to prevent redundant HTTP calls within the same process"
    pr: 116
    file: "internal/infrastructure/depsdev/depsdev.go"
    date: "2026-04-04"
  - category: "api-consistency"
    summary: "Remove unused parameters from function signatures — dead parameters add noise and confuse callers about required context"
    pr: 116
    file: "internal/domain/analysis/lifecycle_assessor.go"
    date: "2026-04-04"
  - category: "defensive-coding"
    summary: "Guard nil struct before method call — CSV renderer called LatestVersionDetail() on potentially nil ReleaseInfo while JSON renderer had the guard"
    pr: 116
    file: "internal/interfaces/cli/scan_render.go"
    date: "2026-04-04"
  - category: "testing"
    summary: "New HTTP endpoints (FetchAdvisory/FetchAdvisoriesBatch) with caching and batch parallelism lacked httptest-based coverage"
    pr: 116
    file: "internal/infrastructure/depsdev/depsdev.go"
    date: "2026-04-04"
  - category: "api-consistency"
    summary: "Reason text (severitySummary) must surface unknown-severity advisory counts to stay consistent with conservative lifecycle classification"
    pr: 116
    file: "internal/domain/analysis/lifecycle_assessor.go"
    date: "2026-04-04"
  - category: "defensive-coding"
    summary: "Filter empty advisory IDs before adding to dedup set — empty IDs trigger invalid API requests to base path"
    pr: 116
    file: "internal/infrastructure/integration/enrich_advisory.go"
    date: "2026-04-04"
  - category: "defensive-coding"
    summary: "Normalize and filter empty/whitespace IDs in batch fetch before deduplication — prevents invalid HTTP requests and cache pollution"
    pr: 116
    file: "internal/infrastructure/depsdev/depsdev.go"
    date: "2026-04-04"
  - category: "defensive-coding"
    summary: "Use select on ctx.Done() when acquiring semaphore in batch goroutines — plain channel send blocks even after context cancellation"
    pr: 116
    file: "internal/infrastructure/depsdev/depsdev.go"
    date: "2026-04-04"

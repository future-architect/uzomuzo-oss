# Copilot review patterns awaiting promotion to coding rules.
#
# Phase 3 of /review appends new FIX-classified patterns here.
# When a category reaches 2+ entries, it is promoted to a rule in
# .github/instructions/ and the promoted entries are removed.
#
# Schema:
#   patterns:
#     - category: "<pattern-category>"
#       summary: "<one-line description>"
#       pr: <PR number>
#       file: "<path>"
#       date: "YYYY-MM-DD"
patterns:
  - category: "error-handling"
    summary: "Distinguish os.ErrNotExist from other I/O errors when auto-detecting files — treating all errors as 'not found' hides real causes"
    pr: 87
    file: "internal/interfaces/cli/scan.go"
    date: "2026-04-02"
  - category: "security"
    summary: "Normalize repository-scoped paths with path.Clean and reject traversal attempts (../ escaping repo root)"
    pr: 111
    file: "internal/infrastructure/depparser/ghaworkflow/parser.go"
    date: "2026-04-03"
  - category: "duplicate-parsing"
    summary: "Provide a combined parser (ParseWorkflowAll) when callers need both external URLs and local paths, avoiding double YAML unmarshal"
    pr: 111
    file: "internal/infrastructure/actionscan/discovery.go"
    date: "2026-04-03"
  - category: "naming-consistency"
    summary: "Use domain constants (LicenseSource*) instead of duplicating raw string values in display/mapping logic — prevents drift when constants are renamed"
    pr: 119
    file: "internal/interfaces/cli/boxdraw.go"
    date: "2026-04-04"
  - category: "comment-doc-drift"
    summary: "Doc comments and inline comments describing enum precedence/taxonomy still used old labels after introducing new MaintenanceStatus constants"
    pr: 121
    file: "internal/domain/analysis/aggregates.go"
    date: "2026-04-04"
  - category: "comment-doc-drift"
    summary: "Struct field comment referenced old label names (EOL > Scheduled EOL) after type was changed to MaintenanceStatus with expanded taxonomy"
    pr: 121
    file: "pkg/uzomuzo/types.go"
    date: "2026-04-04"
  - category: "testing"
    summary: "Test data for EOLScheduled state omitted ScheduledAt field — test fixtures should populate all fields that the state semantically implies"
    pr: 121
    file: "internal/domain/analysis/aggregates_extra_test.go"
    date: "2026-04-04"

# Copilot review patterns awaiting promotion to coding rules.
#
# Phase 3 of /review appends new FIX-classified patterns here.
# When a category reaches 2+ entries, it is promoted to a rule in
# .github/instructions/ and the promoted entries are removed.
#
# Schema:
#   patterns:
#     - category: "<pattern-category>"
#       summary: "<one-line description>"
#       pr: <PR number>
#       file: "<path>"
#       date: "YYYY-MM-DD"
patterns:
  - category: "naming-consistency"
    summary: "Keep field/column names consistent across output formats — if JSON uses 'eol_reason', CSV should too"
    pr: 87
    file: "internal/interfaces/cli/scan_render.go"
    date: "2026-04-02"
  - category: "error-handling"
    summary: "Distinguish os.ErrNotExist from other I/O errors when auto-detecting files — treating all errors as 'not found' hides real causes"
    pr: 87
    file: "internal/interfaces/cli/scan.go"
    date: "2026-04-02"
  - category: "api-consistency"
    summary: "Set User-Agent header on all REST API requests — new endpoints must match existing client conventions"
    pr: 101
    file: "internal/infrastructure/github/contents.go"
    date: "2026-04-03"
  - category: "testing"
    summary: "Add unit tests for new BFS/graph traversal helpers — pure functions like key builders and URL parsers are easy to test"
    pr: 106
    file: "internal/infrastructure/actionscan/discovery.go"
    date: "2026-04-03"
  - category: "deterministic-output"
    summary: "Sort goroutine-collected results before further processing (e.g., BFS seeding) to ensure deterministic behavior"
    pr: 106
    file: "internal/infrastructure/actionscan/discovery.go"
    date: "2026-04-03"
  - category: "security"
    summary: "Normalize repository-scoped paths with path.Clean and reject traversal attempts (../ escaping repo root)"
    pr: 111
    file: "internal/infrastructure/depparser/ghaworkflow/parser.go"
    date: "2026-04-03"
  - category: "comment-doc-drift"
    summary: "When a function scans only step-level uses: (not job-level), the docstring must say so explicitly"
    pr: 111
    file: "internal/infrastructure/depparser/ghaworkflow/parser.go"
    date: "2026-04-03"

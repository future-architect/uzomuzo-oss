# Copilot review patterns awaiting promotion to coding rules.
#
# Phase 3 of /review appends new FIX-classified patterns here.
# When a category reaches 2+ entries, it is promoted to a rule in
# .github/instructions/ and the promoted entries are removed.
#
# Schema:
#   patterns:
#     - category: "<pattern-category>"
#       summary: "<one-line description>"
#       pr: <PR number>
#       file: "<path>"
#       date: "YYYY-MM-DD"
patterns:
  - category: "error-handling"
    summary: "Distinguish os.ErrNotExist from other I/O errors when auto-detecting files — treating all errors as 'not found' hides real causes"
    pr: 87
    file: "internal/interfaces/cli/scan.go"
    date: "2026-04-02"
  # defensive-coding: promoted to coding-standards.instructions.md (PRs #127, #130 — match validation format strings, CI staging completeness, dynamic refs)
  # security: promoted to security.instructions.md (PRs #111, #127 — validate config-sourced paths, reject absolute paths, apply consistently to all config paths)
  - category: "duplicate-parsing"
    summary: "Provide a combined parser (ParseWorkflowAll) when callers need both external URLs and local paths, avoiding double YAML unmarshal"
    pr: 111
    file: "internal/infrastructure/actionscan/discovery.go"
    date: "2026-04-03"
  - category: "naming-consistency"
    summary: "Use domain constants (LicenseSource*) instead of duplicating raw string values in display/mapping logic — prevents drift when constants are renamed"
    pr: 119
    file: "internal/interfaces/cli/boxdraw.go"
    date: "2026-04-04"

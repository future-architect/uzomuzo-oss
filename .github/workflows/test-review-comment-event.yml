name: "Test: review_comment event from Copilot"

on:
  pull_request_review_comment:
    types: [created]

permissions: {}

jobs:
  log-event:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Log event details
        env:
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "=== pull_request_review_comment event received ==="
          echo "Event: $EVENT_NAME"
          echo "Comment user: $COMMENT_USER"
          echo "Comment user type: $COMMENT_USER_TYPE"
          echo "PR: #$PR_NUMBER"
          echo "=== This proves the event fires for this user ==="

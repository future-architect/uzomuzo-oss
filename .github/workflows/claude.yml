name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions: {}

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    if: >-
      contains(github.event.comment.body, '@claude')
      && github.event.comment.user.login == 'kotakanbe'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Determine checkout ref
        id: determine_ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_PR_ISSUE: ${{ github.event.issue.pull_request != '' }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "issue_comment" && "$IS_PR_ISSUE" == "true" ]]; then
            head_sha=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json headRefOid --jq .headRefOid)
            echo "ref=$head_sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.determine_ref.outputs.ref }}

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install tools
        run: go install golang.org/x/tools/cmd/goimports@v0.34.0

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin

      - uses: anthropics/claude-code-action@88c168b39e7e64da0286d812b6e9fbebb6708185 # v1.0.82
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model opus --allowedTools 'Bash(*)' Edit Write Read Glob Grep"
          show_full_output: false
        env:
          CLAUDE_CODE_MAX_TURNS: "50"

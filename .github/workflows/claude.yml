name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions: {}

jobs:
  claude:
    if: >-
      contains(github.event.comment.body, '@claude')
      && github.event.comment.user.login == 'kotakanbe'
      && (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request)
        || github.event_name == 'pull_request_review_comment'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Reject fork PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR number found; skipping fork check."
            exit 0
          fi
          IS_FORK=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json isCrossRepository --jq '.isCrossRepository')
          if [[ "$IS_FORK" == "true" ]]; then
            echo "::error::Fork PRs are not allowed for automated Claude execution"
            exit 1
          fi

      - name: Determine checkout ref
        id: determine_ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_PR_ISSUE: ${{ github.event.issue.pull_request != '' }}
          PR_NUMBER: ${{ github.event.issue.number }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "issue_comment" && "$IS_PR_ISSUE" == "true" ]]; then
            head_sha=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json headRefOid --jq .headRefOid)
            echo "ref=$head_sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.determine_ref.outputs.ref }}
          token: ${{ secrets.GH_ACTIONS_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install tools
        run: go install golang.org/x/tools/cmd/goimports@v0.34.0

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          install-only: true

      - uses: anthropics/claude-code-action@bee87b3258c251f9279e5371b0cc3660f37f3f77 # v1.0.83
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_ACTIONS_TOKEN }}
          claude_args: "--model opus --allowedTools 'Bash(*)' Edit Write Read Glob Grep"
          show_full_output: false
        env:
          CLAUDE_CODE_MAX_TURNS: "50"
